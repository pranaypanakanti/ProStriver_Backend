spring:
  application:
    name: ProStriver

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:5}
      minimum-idle: 0
      connection-timeout: 10000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    from: ${MAIL_FROM:no-reply@prostriver.me}
    from-name: ${MAIL_FROM_NAME:ProStriver}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}

prostriver:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  security:
    jwt:
      issuer: "prostriver-api"
      access-token-minutes: 30
      refresh-token-days: 30
      secret-base64: ${JWT_SECRET_BASE64}
    cookies:
      refresh-token-name: "prostriver_rt"
      refresh-token-path: "/api/auth"
      refresh-token-same-site: ${COOKIE_SAMESITE:Strict}
      refresh-token-secure: ${COOKIE_SECURE:true}

  otp:
    signup-ttl-minutes: 10
    forgot-password-ttl-minutes: 10
    resend-cooldown-seconds: 45
    max-attempts: 5

server:
  servlet:
    session:
      cookie:
        http-only: true


