spring:
  application:
    name: Kronos

  main:
    allow-bean-definition-overriding: true

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX}
      minimum-idle: 0
      connection-timeout: 2000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    from: ${MAIL_FROM:no-reply@prostriver.me}
    from-name: ${MAIL_FROM_NAME:ProStriver}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

kronos:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  security:
    jwt:
      issuer: "kronos-api"
      access-token-minutes: 30
      refresh-token-days: 30
      secret-base64: ${JWT_SECRET_BASE64}
    cookies:
      refresh-token-name: "kronos_rt"
      refresh-token-path: "/api/auth"
      refresh-token-same-site: ${COOKIE_SAMESITE}
      refresh-token-secure: ${COOKIE_SECURE}

  otp:
    signup-ttl-minutes: 10
    forgot-password-ttl-minutes: 10
    resend-cooldown-seconds: 45
    max-attempts: 5

server:
  servlet:
    session:
      cookie:
        http-only: true